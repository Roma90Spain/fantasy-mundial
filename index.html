<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fantasy Mundial 2026</title>
<style>
/* ===== PREMIUM REDESIGN CSS ===== */
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080e1a;
  --card:#0f1826;
  --card2:#131e30;
  --border:#1e3048;
  --border-glow:#2a4a72;
  --accent:#f0c040;
  --accent2:#4caf7d;
  --muted:#6a8099;
  --text:#dce8f4;
  --red:#ff5555;
  --gold-grad:linear-gradient(135deg,#f0c040 0%,#fde68a 40%,#d4930a 70%,#f0c040 100%);
  --silver-grad:linear-gradient(135deg,#b0bec5 0%,#eceff1 50%,#90a4ae 100%);
  --bronze-grad:linear-gradient(135deg,#cd7f32 0%,#e8a95c 50%,#a0522d 100%);
}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  min-height:100vh;
  padding:0 0 24px;
  /* Stadium diagonal line pattern */
  background-image:
    repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 40px,
      rgba(255,255,255,0.012) 40px,
      rgba(255,255,255,0.012) 41px
    ),
    linear-gradient(180deg,#0d1a2e 0%,#080e1a 35%,#080e1a 100%);
}
.container{max-width:480px;margin:0 auto;padding:0 12px}

/* ===== HERO HEADER ===== */
.hero-header{
  background:linear-gradient(180deg,#0a1628 0%,#060c18 100%);
  padding:22px 16px 18px;
  text-align:center;
  position:relative;
  overflow:hidden;
  margin-bottom:16px;
  border-bottom:1px solid rgba(240,192,64,0.15);
}
.hero-header::before{
  content:'';
  position:absolute;
  inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(240,192,64,0.07) 0%,transparent 70%);
  pointer-events:none;
}
.trophy-wrap{
  font-size:3rem;
  display:inline-block;
  animation:trophy-pulse 2.8s ease-in-out infinite;
  filter:drop-shadow(0 0 12px rgba(240,192,64,0.7));
  margin-bottom:6px;
}
@keyframes trophy-pulse{
  0%,100%{filter:drop-shadow(0 0 8px rgba(240,192,64,0.5));transform:scale(1)}
  50%{filter:drop-shadow(0 0 22px rgba(240,192,64,0.95));transform:scale(1.06)}
}
.hero-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:3rem;
  letter-spacing:4px;
  background:var(--gold-grad);
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:gold-shine 4s linear infinite;
  line-height:1;
  margin-bottom:2px;
}
@keyframes gold-shine{
  0%{background-position:0% center}
  100%{background-position:200% center}
}
.hero-year{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.2rem;
  letter-spacing:14px;
  color:rgba(240,192,64,0.55);
  margin-bottom:14px;
}
.host-cards{
  display:flex;
  gap:8px;
  justify-content:center;
  margin-bottom:14px;
}
.host-card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(240,192,64,0.12);
  border-radius:10px;
  padding:6px 14px;
  font-size:0.78rem;
  font-weight:700;
  color:rgba(220,232,244,0.75);
  display:flex;
  align-items:center;
  gap:5px;
}
.host-card span{font-size:1.1rem}
.live-badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:rgba(220,30,30,0.12);
  border:1px solid rgba(220,30,30,0.3);
  border-radius:20px;
  padding:4px 12px;
  font-size:0.68rem;
  font-weight:800;
  letter-spacing:1.5px;
  color:#ff6b6b;
  text-transform:uppercase;
}
.live-dot{
  width:7px;height:7px;
  background:#ff4444;
  border-radius:50%;
  animation:blink 1.2s ease-in-out infinite;
  flex-shrink:0;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

/* ===== BUTTONS ===== */
.update-bar{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.btn{
  padding:10px 12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  font-size:0.85rem;
  cursor:pointer;
  font-weight:700;
  flex:1;
  min-width:70px;
  transition:all 0.18s;
}
.btn:hover{border-color:rgba(240,192,64,0.35);background:#16222e;transform:translateY(-1px)}
.btn.primary{background:linear-gradient(135deg,#2e7d52,#4caf7d);border-color:#4caf7d;color:#fff}
.btn.primary:hover{background:linear-gradient(135deg,#3a9d62,#5dc98d)}
.btn.danger{background:#1e0f0f;border-color:#3a1515;color:var(--red)}
.btn.danger:hover{background:#2a1010}

/* ===== PANELS ===== */
.panel{
  background:linear-gradient(180deg,#111e30 0%,#0c1622 100%);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
  margin-bottom:10px;
  display:none;
  box-shadow:0 8px 32px rgba(0,0,0,0.5),0 1px 0 rgba(255,255,255,0.04) inset;
}
.url-input{
  width:100%;
  padding:10px;
  background:#070d18;
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text);
  font-size:0.9rem;
}
select.url-input{appearance:none;-webkit-appearance:none}

/* ===== RANKING CARDS ===== */
.status{font-size:0.82rem;min-height:20px;margin-bottom:10px;padding:4px 0;text-align:center}
.status.error{color:var(--red)}
.status:not(.error){color:var(--accent2)}
ul.ranking{list-style:none}
.friend{
  background:linear-gradient(135deg,#0e1a28 0%,#0a1420 100%);
  border:1px solid var(--border);
  border-radius:13px;
  margin-bottom:8px;
  overflow:hidden;
  transition:border-color 0.2s,box-shadow 0.2s,transform 0.15s;
}
.friend:hover{
  border-color:rgba(240,192,64,0.3);
  box-shadow:0 0 16px rgba(240,192,64,0.07);
  transform:translateY(-1px);
}
.friend-head{
  display:flex;
  align-items:center;
  padding:10px 13px;
  gap:10px;
  width:100%;
  background:none;
  border:none;
  color:var(--text);
  font:inherit;
  text-align:left;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.rank{
  width:32px;height:32px;
  border-radius:50%;
  background:var(--border);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:0.82rem;
  flex-shrink:0;
}
.rank.gold{
  background:var(--gold-grad);
  color:#5a3800;
  box-shadow:0 0 10px rgba(240,192,64,0.5);
}
.rank.silver{
  background:var(--silver-grad);
  color:#3a3a3a;
  box-shadow:0 0 8px rgba(200,200,200,0.3);
}
.rank.bronze{
  background:var(--bronze-grad);
  color:#3a1a00;
  box-shadow:0 0 8px rgba(205,127,50,0.35);
}
.friend-name{flex:1;font-weight:700;font-size:0.9rem}
.friend-score{font-weight:800;font-size:1rem;color:var(--accent)}
.chevron{color:var(--muted);transition:transform 0.2s;font-size:0.85rem;margin-left:6px}
.roster{display:none;background:rgba(5,10,18,0.6)}
.roster-inner{padding:4px 14px 12px}
.pos-group{margin-top:8px}
.pos-title{font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px}
.player-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(30,48,72,0.7)}
.player-name{font-size:0.88rem}
.player-score{font-weight:700;font-size:0.9rem;color:var(--accent2)}
.player-score.zero{color:var(--muted)}
.captain-badge{
  background:var(--gold-grad);
  color:#5a3800;
  border-radius:50%;
  width:17px;height:17px;
  font-size:0.6rem;font-weight:900;
  display:inline-flex;align-items:center;justify-content:center;
  margin-left:4px;
  vertical-align:middle;
  box-shadow:0 0 5px rgba(240,192,64,0.4);
}
.partido-col{flex:1;min-width:0;padding:4px 6px}
.partido-col-title{font-weight:700;font-size:0.78rem;color:var(--accent);text-align:center;margin-bottom:6px;border-bottom:1px solid var(--border);padding-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.partido-pos-title{font-size:0.62rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:5px 0 2px}
.partido-player{display:flex;justify-content:space-between;padding:2px 0;font-size:0.78rem}
.divider-v{width:1px;background:var(--border);align-self:stretch;flex-shrink:0}
.empty{color:var(--muted);text-align:center;padding:20px}
.arrow-up{color:#4caf7d;font-size:0.85rem;margin-left:6px;font-weight:900}
.arrow-down{color:#ff6b6b;font-size:0.85rem;margin-left:6px;font-weight:900}

/* ===== SEARCH ===== */
.search-result{
  background:rgba(7,13,24,0.8);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px 12px;
  margin-bottom:6px;
}
.search-result-name{font-weight:700;font-size:0.9rem;margin-bottom:3px}
.search-result-meta{font-size:0.75rem;color:var(--muted);margin-bottom:5px}
.search-owner-row{display:flex;justify-content:space-between;align-items:center;font-size:0.8rem;padding:3px 0;border-bottom:1px solid rgba(30,48,72,0.5)}
.search-owner-row:last-child{border-bottom:none}

/* ===== 11 IDEAL ===== */
.xi-section{margin-bottom:12px}
.xi-pos-title{font-size:0.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px}
.xi-player{
  display:flex;justify-content:space-between;align-items:center;
  padding:7px 11px;
  background:rgba(7,13,24,0.7);
  border:1px solid var(--border);
  border-radius:9px;
  margin-bottom:4px;
}
.xi-player-name{font-weight:700;font-size:0.88rem}
.xi-player-sel{font-size:0.72rem;color:var(--muted)}
.xi-player-pts{font-weight:800;font-size:0.95rem}

/* ===== CALENDARIO ===== */
.cal-day{margin-bottom:12px}
.cal-day-title{font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);border-bottom:1px solid var(--border);padding-bottom:4px;margin-bottom:6px}
.cal-match{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 10px;
  background:rgba(7,13,24,0.6);
  border:1px solid var(--border);
  border-radius:8px;
  margin-bottom:4px;
  font-size:0.82rem;
}
.cal-teams{font-weight:600;flex:1;text-align:center}
.cal-time{font-size:0.72rem;color:var(--accent);flex-shrink:0;min-width:44px;text-align:right}
.cal-played{border-color:rgba(76,175,125,0.25);opacity:0.6}

/* ===== ESTADÍSTICAS ===== */
.stat-card{
  background:rgba(7,13,24,0.7);
  border:1px solid var(--border);
  border-radius:11px;
  padding:12px;
  margin-bottom:8px;
}
.stat-card-title{font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(30,48,72,0.5);font-size:0.82rem}
.stat-row:last-child{border-bottom:none}
.stat-bar-wrap{margin-top:3px;background:rgba(30,48,72,0.6);border-radius:4px;height:5px;margin-bottom:4px}
.stat-bar{height:5px;border-radius:4px;background:var(--accent2)}

/* ===== KNOCKOUT ===== */
.ko-round{margin-bottom:14px}
.ko-round-title{font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.ko-match{
  background:rgba(7,13,24,0.7);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px 12px;
  margin-bottom:6px;
}
.ko-match-teams{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.ko-team-btn{
  flex:1;padding:6px 10px;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  font-size:0.82rem;font-weight:600;
  cursor:pointer;text-align:center;
  transition:all 0.15s;
}
.ko-team-btn.winner{background:#0e2a1a;border-color:var(--accent2);color:var(--accent2)}
.ko-team-btn.loser{opacity:0.35}
.pos-arrow{font-size:0.68rem;font-weight:800;padding:2px 6px;border-radius:6px;flex-shrink:0;min-width:32px;text-align:center}
.pos-arrow.up{color:#4caf7d;background:rgba(76,175,125,0.15);border:1px solid rgba(76,175,125,0.2)}
.pos-arrow.down{color:#ff6b6b;background:rgba(255,107,107,0.15);border:1px solid rgba(255,107,107,0.2)}
.pos-arrow.same{color:var(--muted);font-size:0.75rem;min-width:16px}
.ko-vs{color:var(--muted);font-size:0.75rem;flex-shrink:0}

</style>
</head>
<body>
<div class="hero-header">
  <div class="trophy-wrap">🏆</div>
  <div class="hero-title">FANTASY MUNDIAL</div>
  <div class="hero-year">2 0 2 6</div>
  <div class="host-cards">
    <div class="host-card"><span>🇺🇸</span> EE.UU.</div>
    <div class="host-card"><span>🇨🇦</span> CANADÁ</div>
    <div class="host-card"><span>🇲🇽</span> MÉXICO</div>
  </div>
  <div class="live-badge"><div class="live-dot"></div>EN JUEGO · FASE DE GRUPOS</div>
</div>
<div class="container">

  <div class="update-bar">
    <button class="btn" id="saveBtn">💾 Guardar web</button>
    <button class="btn" id="backupBtn" style="background:#0e1a2a;border-color:#1e3a5a;color:#7ab8ff;">📦 Backup</button>
    <button class="btn" id="importBtn" style="background:#0e0e1e;border-color:#2a1e4a;color:#b07aff;">📥 Importar</button>
    <button class="btn danger" id="resetBtn">🗑️ Reset</button>
    <input type="file" id="importFile" accept=".json" style="display:none">
  </div>
  <div class="update-bar">
    <button class="btn" id="toggleTopBtn">🌟 Top 10</button>
    <button class="btn primary" id="togglePartidosBtn">⚽ Grupos</button>
    <button class="btn" id="toggleKnockoutBtn" style="background:#0a1a30;border-color:#1a3a6a;color:#7ab8ff;">🏆 Eliminatorias</button>
  </div>
  <div class="update-bar">
    <button class="btn" id="toggleSearchBtn" style="flex:1;background:#0a1a0a;border-color:#1a3a1a;color:#7aff8a;">🔍 Buscar</button>
    <button class="btn" id="shareBtn" style="flex:1;background:#0a1800;border-color:#1a4800;color:#a0e040;">📤 Compartir</button>
    <button class="btn" id="toggle11Btn" style="flex:1;background:#18081a;border-color:#3a1040;color:#e070ff;">⚽ 11 ideal</button>
  </div>
  <div class="update-bar">
    <button class="btn" id="toggleCalBtn" style="flex:1;background:#080e20;border-color:#1a1a50;color:#9090ff;">📅 Calendario</button>
    <button class="btn" id="toggleStatsBtn" style="flex:1;background:#1a0808;border-color:#4a1010;color:#ffaaaa;">📊 Estadísticas</button>
  </div>

  <!-- Paneles -->
  <div class="panel" id="topPanel" style="display:none"></div>
  <div class="panel" id="knockoutPanel" style="display:none">
    <div style="font-weight:700;font-size:1rem;margin-bottom:10px">🏆 Fase eliminatoria</div>
    <div id="knockoutRounds"></div>
  </div>
  <div class="panel" id="searchPanel" style="display:none">
    <div style="margin-bottom:8px;font-weight:700;font-size:0.9rem">🔍 Buscar jugador</div>
    <input type="text" id="searchInput" class="url-input" placeholder="Escribe un nombre..." style="margin-bottom:8px">
    <div id="searchResults"></div>
  </div>
  <div class="panel" id="panel11" style="display:none">
    <div style="font-weight:700;font-size:0.95rem;margin-bottom:10px">⚽ 11 ideal del campeonato</div>
    <div id="content11"></div>
  </div>
  <div class="panel" id="calPanel" style="display:none">
    <div style="font-weight:700;font-size:0.95rem;margin-bottom:10px">📅 Calendario de partidos</div>
    <div style="display:flex;gap:6px;margin-bottom:12px">
      <button class="btn" id="calTabGrupos" onclick="switchCalTab('grupos')" style="flex:1;background:#0a1628;border-color:#2a4a72;color:#7ab8ff;font-size:0.82rem">⚽ Fase de grupos</button>
      <button class="btn" id="calTabFinal" onclick="switchCalTab('final')" style="flex:1;background:#0a1628;border-color:#2a4a72;color:#f0c040;font-size:0.82rem">🏆 Fase final</button>
    </div>
    <div id="calContent"></div>
  </div>
  <div class="panel" id="statsPanel" style="display:none">
    <div style="font-weight:700;font-size:0.95rem;margin-bottom:10px">📊 Estadísticas de la peña</div>
    <div id="statsContent"></div>
  </div>
  <div class="panel" id="partidosPanel" style="display:none">
    <select id="grupoSelect" class="url-input" style="margin-bottom:8px">
      <option value="">— Selecciona un grupo —</option>
      <option>A</option><option>B</option><option>C</option><option>D</option>
      <option>E</option><option>F</option><option>G</option><option>H</option>
      <option>I</option><option>J</option><option>K</option><option>L</option>
    </select>
    <select id="partidoSelect" class="url-input" style="margin-bottom:8px;display:none"></select>
    <div id="partidoImportPanel" style="display:none">
      <div id="partidoTitulo" style="font-weight:700;margin-bottom:8px;font-size:0.95rem"></div>
      <div style="font-size:0.78rem;color:var(--muted);margin-bottom:6px">Pega el texto de "Puntos oficiales" de Comuniazo:</div>
      <textarea id="partidoPasteArea" class="url-input" rows="6" style="resize:vertical;font-family:inherit" placeholder="Pega aquí el texto copiado de Comuniazo..."></textarea>
      <button class="btn primary" id="partidoImportBtn" style="margin-top:8px;width:100%">✅ Importar puntos del partido</button>
    </div>
    <div id="historialPartidos" style="margin-top:10px"></div>
  </div>

  <div class="status" id="status"></div>
  <ul class="ranking" id="ranking"></ul>

const ADMIN_PASS = "mundial2026";

// ===== HELPERS =====
function getScore(n){ return DATA.playerBase[n] ?? 0; }
function getFriendTotal(f){ return f.team.reduce((s,p)=>{ let pts=getScore(p.name); return s+pts+(p.captain?pts:0); },0); }
function getSorted(){ return [...DATA.friends].sort((a,b)=>getFriendTotal(b)-getFriendTotal(a)); }
function setStatus(msg,err=false){ const s=document.getElementById('status'); s.textContent=msg; s.className='status'+(err?' error':''); }
function closeAllPanels(){
  ['topPanel','partidosPanel','knockoutPanel','searchPanel','panel11','calPanel','statsPanel']
    .forEach(id=>{ const el=document.getElementById(id); if(el) el.style.display='none'; });
}
function togglePanel(id){
  const el=document.getElementById(id);
  const wasOpen=el.style.display==='block';
  closeAllPanels();
  if(!wasOpen) el.style.display='block';
}
function adminOk(){ return prompt('Contraseña admin:')===ADMIN_PASS; }
function rankClass(i){ return i===0?'gold':i===1?'silver':i===2?'bronze':''; }
function rankLabel(i){ return i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1); }

// ===== RENDER RANKING =====
function renderRanking(){
  const sorted=getSorted();
  const ul=document.getElementById('ranking');
  ul.innerHTML='';
  sorted.forEach((f,i)=>{
    const total=getFriendTotal(f);
    const li=document.createElement('li');
    li.className='friend';
    const rc=rankClass(i);
    const rl=rankLabel(i);
    // Arrow: compare current position vs prevPositions snapshot
    let arrow='';
    if(DATA.prevPositions && DATA.prevPositions[f.name]!==undefined){
      const prev=DATA.prevPositions[f.name];
      const diff=prev-i; // positive = moved up
      if(diff>0) arrow=`<span class="pos-arrow up" title="Subió ${diff} puesto${diff>1?'s':''}">▲${diff}</span>`;
      else if(diff<0) arrow=`<span class="pos-arrow down" title="Bajó ${Math.abs(diff)} puesto${Math.abs(diff)>1?'s':''}">▼${Math.abs(diff)}</span>`;
      else arrow='';
    }
    li.innerHTML=`<button class="friend-head" onclick="toggleRoster(this)">
      <div class="rank ${rc}">${rl}</div>
      <div class="friend-name">${f.name}</div>
      <div style="display:flex;align-items:center;gap:6px;margin-left:auto">
        ${arrow}
        <div class="friend-score">${total} pts</div>
      </div>
      <div class="chevron">▼</div>
    </button>
    <div class="roster"><div class="roster-inner">${buildRoster(f)}</div></div>`;
    ul.appendChild(li);
  });
}

function buildRoster(f){
  const byPos={'1.Portero':[],'2.Defensa':[],'3.Mediocentro':[],'4.Delantero':[]};
  f.team.forEach(p=>{ if(byPos[p.pos]) byPos[p.pos].push(p); });
  const labels={'1.Portero':'Portero','2.Defensa':'Defensa','3.Mediocentro':'Mediocentro','4.Delantero':'Delantero'};
  return Object.entries(byPos).map(([pos,players])=>{
    if(!players.length) return '';
    const rows=players.map(p=>{
      const pts=getScore(p.name);
      const cap=p.captain?`<span class="captain-badge">C</span>`:'';
      const eff=pts*(p.captain?2:1);
      return `<div class="player-row"><span class="player-name">${p.name}${cap}</span><span class="player-score ${pts===0?'zero':''}">${eff} pts</span></div>`;
    }).join('');
    return `<div class="pos-group"><div class="pos-title">${labels[pos]}</div>${rows}</div>`;
  }).join('');
}

function toggleRoster(btn){
  const roster=btn.parentElement.querySelector('.roster');
  const ch=btn.querySelector('.chevron');
  const isOpen=roster.style.display==='block';
  // close all
  document.querySelectorAll('.roster').forEach(r=>r.style.display='none');
  document.querySelectorAll('.chevron').forEach(c=>c.style.transform='');
  if(!isOpen){ roster.style.display='block'; ch.style.transform='rotate(180deg)'; }
}

function renderPartidosPanel(){
  const grupoSel=document.getElementById('grupoSelect').value;
  const partidoSel=document.getElementById('partidoSelect');
  const importPanel=document.getElementById('partidoImportPanel');
  const historial=document.getElementById('historialPartidos');

  if(!grupoSel){
    partidoSel.style.display='none';
    importPanel.style.display='none';
    historial.innerHTML='';
    const counter=document.getElementById('importCounter');
    if(counter) counter.innerHTML='';
    return;
  }

  const partidos=CALENDARIO.filter(c=>c.g===grupoSel);
  const totalCamp=CALENDARIO.length;
  const importadosCamp=CALENDARIO.filter(c=>DATA.historialPartidos[c.id]).length;
  const totalGrupo=partidos.length;
  const importadosGrupo=partidos.filter(p=>DATA.historialPartidos[p.id]).length;

  // Contador
  let counter=document.getElementById('importCounter');
  if(!counter){ counter=document.createElement('div'); counter.id='importCounter'; counter.style.cssText='font-size:0.8rem;font-weight:700;margin-bottom:10px;'; document.getElementById('grupoSelect').after(counter); }
  counter.innerHTML=`<span style="color:var(--accent2)">⚽ ${importadosCamp}/${totalCamp} partidos importados</span> <span style="color:var(--muted);font-size:0.72rem">· Grupo ${grupoSel}: ${importadosGrupo}/${totalGrupo}</span>`;

  // Select de partidos (solo los no importados para importar)
  const noImportados=partidos.filter(p=>!DATA.historialPartidos[p.id]);
  if(noImportados.length){
    partidoSel.innerHTML='<option value="">— Importar partido —</option>'+
      noImportados.map(p=>`<option value="${p.id}">⬜ ${p.local} vs ${p.visit} (${p.fecha})</option>`).join('');
    partidoSel.style.display='block';
  } else {
    partidoSel.style.display='none';
  }
  importPanel.style.display='none';

  // Historial: desplegables por partido ya importado
  const jugados=partidos.filter(p=>DATA.historialPartidos[p.id]);
  if(jugados.length){
    const cols=['PT','DF','MC','DL'];
    const colLabels=['PT','DF','MC','DL'];

    function colHtml(players,title){
      const byPos={'PT':[],'DF':[],'MC':[],'DL':[],'?':[]};
      players.forEach(j=>{
        const db=PLAYERS_DB[j.nombre];
        const pos=db?db[0]:'?';
        if(byPos[pos]!==undefined) byPos[pos].push(j); else byPos['?'].push(j);
      });
      const allPos=[...cols,'?'];
      const allLabels=[...colLabels,'?'];
      return `<div class="partido-col"><div class="partido-col-title">${title}</div>`+
        allPos.map((pos,pi)=>{
          const pl=byPos[pos];
          return pl.length
            ? `<div class="partido-pos-title">${allLabels[pi]}</div>`+
              pl.map(j=>`<div class="partido-player"><span>${j.nombre}</span><span style="color:${j.pts>0?'var(--accent2)':j.pts<0?'var(--red)':'var(--muted)'}">${j.pts}</span></div>`).join('')
            : '';
        }).join('')+
        `</div>`;
    }

    historial.innerHTML=jugados.map(p=>{
      const h=DATA.historialPartidos[p.id];
      const jAll=h.jugadores;
      let jLocal=[],jVisit=[];
      jAll.forEach(j=>{
        const db=PLAYERS_DB[j.nombre];
        if(db){ if(db[1]===p.local) jLocal.push(j); else jVisit.push(j); }
        else jVisit.push(j);
      });
      if(!jLocal.length && jVisit.length){ const mid=Math.ceil(jVisit.length/2); jLocal=jVisit.splice(0,mid); }

      const uid='hist_'+p.id;
      return `<details style="background:rgba(7,13,24,0.7);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;overflow:hidden;">
        <summary style="padding:10px 14px;cursor:pointer;font-weight:700;font-size:0.85rem;color:var(--accent);list-style:none;display:flex;justify-content:space-between;align-items:center;">
          <span>✅ ${p.local} vs ${p.visit} <span style="color:var(--muted);font-weight:400;font-size:0.75rem">· ${p.fecha}</span></span>
          <span style="color:var(--muted);font-size:0.75rem">▼</span>
        </summary>
        <div style="padding:0 12px 12px;border-top:1px solid var(--border);">
          <div style="display:flex;gap:4px;margin-top:10px">
            ${colHtml(jLocal,FLAGS[p.local]||p.local)}
            <div class="divider-v"></div>
            ${colHtml(jVisit,FLAGS[p.visit]||p.visit)}
          </div>
        </div>
      </details>`;
    }).join('');
  } else {
    historial.innerHTML=`<div class="empty">No hay partidos importados para el Grupo ${grupoSel}</div>`;
  }
}

document.getElementById('partidoImportBtn').addEventListener('click', function(){
  if(!adminOk()) return;
  const id=document.getElementById('partidoSelect').value;
  if(!id){ setStatus('Selecciona un partido',true); return; }
  const texto=document.getElementById('partidoPasteArea').value.trim();
  if(!texto){ setStatus('Pega el texto de Comuniazo',true); return; }
  const partido=CALENDARIO.find(c=>c.id===id);
  const jugadores=[];

  // Parser dual: detecta si el formato es "Nombre\nPuntos" (Comuniazo) o "Nombre Puntos" (una línea)
  const lines=texto.split('\n').map(l=>l.trim()).filter(Boolean);
  const numOnlyRe=/^-?\d+$/;
  const allPlayerBase=Object.keys(DATA.playerBase);

  function tryMatch(nombre){
    if(!nombre) return null;
    // Exacto
    if(DATA.playerBase[nombre]!==undefined) return nombre;
    // Case-insensitive
    const low=nombre.toLowerCase();
    return allPlayerBase.find(k=>k.toLowerCase()===low)||null;
  }

  // Detectar formato: si hay líneas que son solo números intercaladas con nombres
  const hasAltFormat=lines.some((l,i)=>numOnlyRe.test(l) && i>0 && !numOnlyRe.test(lines[i-1]));

  if(hasAltFormat){
    // Formato Comuniazo: Nombre\nPuntos\nNombre\nPuntos...
    // Ignorar líneas que no sean jugadores ni números (cabeceras como "Puntos oficiales", "Comunio", "Sofascore")
    let i=0;
    while(i<lines.length){
      const line=lines[i];
      if(numOnlyRe.test(line)){ i++; continue; } // número suelto sin nombre previo reconocido
      // Buscar si la siguiente línea es un número
      if(i+1<lines.length && numOnlyRe.test(lines[i+1])){
        const nombre=line;
        const pts=parseInt(lines[i+1]);
        const match=tryMatch(nombre);
        if(match){
          DATA.playerBase[match]=pts;
          jugadores.push({nombre:match,pts});
        }
        i+=2;
      } else {
        i++; // línea de cabecera o texto, saltar
      }
    }
  } else {
    // Formato clásico: "Nombre Puntos" en una línea
    lines.forEach(line=>{
      const parts=line.split(/\s+/);
      if(parts.length<2) return;
      const last=parts[parts.length-1];
      if(!/^-?\d+$/.test(last)) return;
      const pts=parseInt(last);
      const nombre=parts.slice(0,parts.length-1).join(' ');
      const match=tryMatch(nombre);
      if(match){ DATA.playerBase[match]=pts; jugadores.push({nombre:match,pts}); }
    });
  }

  if(!jugadores.length){ setStatus('No se reconoció ningún jugador. Revisa el formato.',true); return; }
  // Snapshot de posiciones ANTES de aplicar
  const snapSorted=getSorted();
  DATA.prevPositions={};
  snapSorted.forEach((f,i)=>{ DATA.prevPositions[f.name]=i; });
  DATA.historialPartidos[id]={local:partido.local,visitante:partido.visit,fecha:partido.fecha,jugadores};
  setStatus(`✅ ${jugadores.length} jugadores importados para ${partido.local} vs ${partido.visit}`);
  renderRanking();
  renderPartidosPanel();
});

});

// ===== 11 IDEAL =====
function render11(){
  const panel=document.getElementById('content11');
  const posOrder=['PT','DF','MC','DL'];
  const posLabels={'PT':'🧤 Portero (1)','DF':'🛡️ Defensa (4)','MC':'⚙️ Mediocentro (4)','DL':'⚡ Delantero (2)'};
  const posCount={'PT':1,'DF':4,'MC':4,'DL':2};
  
  // Todos los jugadores del campeonato con posición conocida (PLAYERS_DB usa PT/DF/MC/DL)
  const byPos={'PT':[],'DF':[],'MC':[],'DL':[]};
  const seen=new Set();
  Object.entries(DATA.playerBase).forEach(([name,pts])=>{
    const db=PLAYERS_DB[name];
    if(!db) return;
    const [pos,nat]=db;
    if(byPos[pos]===undefined || seen.has(name)) return;
    seen.add(name);
    byPos[pos].push({name,pts,nat});
  });

  let out='';
  let totalPts11=0;
  const xi11=[]; // colectar los 11 para el total
  posOrder.forEach(pos=>{
    const top=byPos[pos].sort((a,b)=>b.pts-a.pts).slice(0,posCount[pos]);
    top.forEach(p=>xi11.push(p));
  });
  totalPts11=xi11.reduce((s,p)=>s+p.pts,0);

  // Cabecera con total

// ===== KNOCKOUT =====
// ===== KNOCKOUT REWRITE =====

// Estructura: 8 partidos de octavos, 4 cuartos, 2 semis, 1 final
// knockout stored as: DATA.knockout = { r16_0: {a:'España', b:'Marruecos', winner:'España'}, ... }

const TODOS_EQUIPOS = [
  "México","Sudáfrica","Corea del Sur","Rep. Checa",
  "Canadá","Bosnia y Herz.","Catar","Suiza",
  "Brasil","Marruecos","Haití","Escocia",
  "EE.UU.","Paraguay","Australia","Turquía",
  "Alemania","Curazao","Costa de Marfil","Ecuador",
  "Países Bajos","Japón","Suecia","Túnez",
  "Bélgica","Egipto","Irán","Nueva Zelanda",
  "España","Cabo Verde","Arabia Saudita","Uruguay",
  "Francia","Senegal","Irak","Noruega",
  "Argentina","Argelia","Austria","Jordania",
  "Portugal","RD Congo","Uzbekistán","Colombia",
  "Inglaterra","Croacia","Ghana","Panamá"
];

const KO_STRUCTURE = {
  r16: { label:"Octavos de final", count:16, prev:null },
  qf:  { label:"Cuartos de final", count:8,  prev:"r16" },
  sf:  { label:"Semifinales",      count:4,  prev:"qf" },
  f:   { label:"Final",            count:1,  prev:"sf" }
};
const KO_ORDER = ["r16","qf","sf","f"];

function koGetMatch(round, idx){ return (DATA.knockout||{})[round+"_"+idx]||{a:"",b:"",winner:""}; }
function koSetMatch(round, idx, data){ if(!DATA.knockout) DATA.knockout={}; DATA.knockout[round+"_"+idx]=data; }

function koGetWinners(round){
  const info = KO_STRUCTURE[round];
  return Array.from({length:info.count}, (_,i)=>{
    const m = koGetMatch(round,i);
    return m.winner||null;
  });
}

function koRoundHasAnyWinner(round){
  return koGetWinners(round).some(w=>w!==null);
}

function koGetUsedInRound(round, excludeIdx){
  // teams already assigned in this round (both slots), excluding the match at excludeIdx
  const info = KO_STRUCTURE[round];
  const used = new Set();
  for(let i=0;i<info.count;i++){
    if(i===excludeIdx) continue;
    const m = koGetMatch(round,i);
    if(m.a) used.add(m.a);
    if(m.b) used.add(m.b);
  }
  return used;
}

function koAvailableTeams(round, matchIdx, slot){
  // slot: 'a' or 'b'
  const m = koGetMatch(round, matchIdx);
  const other = slot==='a'?m.b:m.a; // team in the other slot of this match

  let pool;
  if(round==="r16"){
    pool = [...TODOS_EQUIPOS];
  } else {
    const prevRound = KO_STRUCTURE[round].prev;
    pool = koGetWinners(prevRound).filter(w=>w!==null);
  }

  // Remove teams used in other matches of this round (but allow the current slot's own value)
  const used = koGetUsedInRound(round, matchIdx);
  // Also remove the team in the OTHER slot of this match (can't play itself)
  if(other) used.add(other);

  const current = slot==='a'?m.a:m.b;
  return pool.filter(t=> t===current || !used.has(t));
}

function renderKnockout(){
  if(!DATA.knockout) DATA.knockout={};
  const wrap = document.getElementById('knockoutRounds');
  let html = '';

  KO_ORDER.forEach(round=>{
    const info = KO_STRUCTURE[round];
    const prevRound = info.prev;
    const prevHasWinner = prevRound ? koRoundHasAnyWinner(prevRound) : true;

    html += `<div class="ko-round">
      <div class="ko-round-title">${info.label}</div>`;

    if(!prevHasWinner && prevRound){
      html += `<div style="color:var(--muted);font-size:0.82rem;padding:10px 4px">⏳ Disponible cuando haya ganadores en ${KO_STRUCTURE[prevRound].label}</div>`;
    } else {
      for(let i=0;i<info.count;i++){
        const m = koGetMatch(round,i);
        const availA = koAvailableTeams(round,i,'a');
        const availB = koAvailableTeams(round,i,'b');

        const selA = buildTeamSelect(round,i,'a',m.a,availA,m.winner);
        const selB = buildTeamSelect(round,i,'b',m.b,availB,m.winner);

        const winnerBar = m.winner
          ? `<div style="font-size:0.7rem;color:var(--accent2);margin-top:5px;text-align:center">✅ Ganador: <strong>${m.winner}</strong></div>`
          : `<div style="font-size:0.7rem;color:var(--muted);margin-top:5px;text-align:center">— Selecciona ganador —</div>`;

        html += `<div class="ko-match">
          <div style="font-size:0.7rem;color:var(--muted);margin-bottom:6px">Partido ${i+1}</div>
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
            ${selA}
            <span style="color:var(--muted);font-size:0.75rem;flex-shrink:0">vs</span>
            ${selB}
          </div>
          <div style="display:flex;gap:6px;justify-content:center">
            <button class="ko-team-btn ${m.winner&&m.winner===m.a?'winner':''}" style="font-size:0.72rem;padding:4px 10px"
              onclick="koPickWinner('${round}',${i},'a')" ${!m.a||!m.b?'disabled':''}>
              ${m.a?'🏆 '+m.a:'—'}
            </button>
            <button class="ko-team-btn ${m.winner&&m.winner===m.b?'winner':''}" style="font-size:0.72rem;padding:4px 10px"
              onclick="koPickWinner('${round}',${i},'b')" ${!m.a||!m.b?'disabled':''}>
              ${m.b?'🏆 '+m.b:'—'}
            </button>
          </div>
          ${winnerBar}
        </div>`;
      }
    }
    html += '</div>';
  });

  wrap.innerHTML = html;
  // Refresh calendar final tab if open
  if(document.getElementById('calPanel').style.display==='block' && calTab==='final') renderCal();
}

function buildTeamSelect(round, idx, slot, current, available, winner){
  const mid = `${round}_${idx}_${slot}`;
  const disabled = winner ? 'disabled' : '';
  const opts = ['<option value="">— Equipo —</option>',
    ...available.map(t=>`<option value="${t}" ${t===current?'selected':''}>${(FLAGS[t]||'')} ${t}</option>`)
  ].join('');
  const style = winner
    ? (current===winner ? 'border-color:var(--accent2);color:var(--accent2);' : 'opacity:0.35;')
    : '';
  return `<select class="url-input" style="flex:1;font-size:0.78rem;padding:5px 6px;${style}" ${disabled}
    onchange="koSetSlot('${round}',${idx},'${slot}',this.value)">${opts}</select>`;
}

function koSetSlot(round, idx, slot, value){
  if(!adminOk()) return;
  const m = {...koGetMatch(round,idx)};
  m[slot] = value;
  m.winner = ""; // reset winner if team changes
  koSetMatch(round, idx, m);
  renderKnockout();
}

function koPickWinner(round, idx, slot){
  if(!adminOk()) return;
  const m = {...koGetMatch(round,idx)};
  if(!m.a || !m.b) return;
  const newWinner = slot==='a'?m.a:m.b;
  m.winner = m.winner===newWinner ? "" : newWinner; // toggle
  koSetMatch(round, idx, m);

  // If winner changes, clear downstream rounds that might have this match's loser
  clearDownstreamIfNeeded(round, idx);
  renderKnockout();
}

function clearDownstreamIfNeeded(round, idx){
  // When winner of (round,idx) changes, find where they feed into next round and clear if stale
  const rounds = KO_ORDER;
  const rIdx = rounds.indexOf(round);
  if(rIdx < 0 || rIdx >= rounds.length-1) return;
  const nextRound = rounds[rIdx+1];
  const nextMatchIdx = Math.floor(idx/2);
  const nextSlot = idx%2===0?'a':'b';
  const nm = {...koGetMatch(nextRound, nextMatchIdx)};
  const m = koGetMatch(round,idx);
  // If next match slot has the old value (winner), clear it
  // Actually just always clear the slot to let user re-pick
  if(nextSlot==='a') nm.a=""; else nm.b="";
  nm.winner="";
  koSetMatch(nextRound, nextMatchIdx, nm);
}
